# Release workflow — builds installers for all platforms and publishes a GitHub Release.
#
# Triggered when a version tag (v*.*.*) is pushed.
# Produces:
#   - macOS PKG installers (aarch64 + x86_64)
#   - Windows NSIS installers (x64 + arm64)
#   - Tauri update manifest (latest.json)

name: Release
on:
  workflow_dispatch:
    inputs:
      macos_aarch64:
        description: 'macOS Apple Silicon (aarch64)'
        type: boolean
        default: true
      macos_x86_64:
        description: 'macOS Intel (x86_64)'
        type: boolean
        default: true
      windows_x64:
        description: 'Windows x64'
        type: boolean
        default: true
      windows_arm64:
        description: 'Windows ARM64'
        type: boolean
        default: true
# on:
#   push:
#     tags: ['v*.*.*']

permissions:
  contents: write  # needed for creating GitHub Releases
  id-token: write  # needed for OIDC auth to Azure Trusted Signing

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Compute build matrices from workflow_dispatch inputs ─────────────

  setup:
    runs-on: ubuntu-latest
    outputs:
      macos_matrix:   ${{ steps.matrix.outputs.macos }}
      windows_matrix: ${{ steps.matrix.outputs.windows }}
    steps:
      - id: matrix
        run: |
          MACOS='[]'
          WINDOWS='[]'
          if [ "${{ inputs.macos_aarch64 }}" = "true" ]; then
            MACOS=$(echo "$MACOS" | jq -c '. + [{"arch":"aarch64","target":"aarch64-apple-darwin","xtask_target":"macos-aarch64","runner":"macos-14"}]')
          fi
          if [ "${{ inputs.macos_x86_64 }}" = "true" ]; then
            MACOS=$(echo "$MACOS" | jq -c '. + [{"arch":"x86_64","target":"x86_64-apple-darwin","xtask_target":"macos-x86_64","runner":"macos-15-intel"}]')
          fi
          if [ "${{ inputs.windows_x64 }}" = "true" ]; then
            WINDOWS=$(echo "$WINDOWS" | jq -c '. + [{"arch":"x64","target":"x86_64-pc-windows-msvc","xtask_target":"windows-x64","runner":"windows-latest"}]')
          fi
          if [ "${{ inputs.windows_arm64 }}" = "true" ]; then
            WINDOWS=$(echo "$WINDOWS" | jq -c '. + [{"arch":"arm64","target":"aarch64-pc-windows-msvc","xtask_target":"windows-arm64","runner":"windows-latest"}]')
          fi
          echo "macos=$MACOS"   >> "$GITHUB_OUTPUT"
          echo "windows=$WINDOWS" >> "$GITHUB_OUTPUT"

  # ── macOS builds ────────────────────────────────────────────────────

  build-macos:
    needs: setup
    if: needs.setup.outputs.macos_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.macos_matrix) }}
    runs-on: ${{ matrix.runner }}
    env:
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hivemind-desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/hivemind-desktop

      - name: Setup code-signing keychain
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > cert.p12
          security create-keychain -p "" build.keychain
          security import cert.p12 -k build.keychain \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/productsign
          security list-keychains -s build.keychain
          security set-keychain-settings build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm -f cert.p12

      - name: Build PKG installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_APP_CERT_NAME: ${{ secrets.APPLE_APP_CERT_NAME }}
        run: cargo xtask build-installer --target ${{ matrix.xtask_target }}

      - name: Sign and notarize
        if: env.HAS_APPLE_CERT == 'true'
        env:
          APPLE_CERTIFICATE_NAME: ${{ secrets.APPLE_CERTIFICATE_NAME }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
        run: |
          PKG=$(ls dist/HiveMind-*-${{ matrix.arch }}.pkg | head -1)
          bash scripts/macos/sign-and-notarize.sh "$PKG"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: |
            dist/HiveMind-*.pkg
            target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            target/${{ matrix.target }}/release/bundle/macos/*.tar.gz.sig

  # ── Windows builds ──────────────────────────────────────────────────

  build-windows:
    needs: setup
    if: needs.setup.outputs.windows_matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.setup.outputs.windows_matrix) }}
    runs-on: ${{ matrix.runner }}
    env:
      HAS_AZURE_SIGNING: ${{ secrets.AZURE_TENANT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.arch }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hivemind-desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/hivemind-desktop

      - name: Download VC++ Redistributable
        shell: pwsh
        run: |
          $vcUrl = if ("${{ matrix.arch }}" -eq "arm64") {
            "https://aka.ms/vs/17/release/vc_redist.arm64.exe"
          } else {
            "https://aka.ms/vs/17/release/vc_redist.x64.exe"
          }
          $dest = "apps/hivemind-desktop/src-tauri/vc_redist.exe"
          Invoke-WebRequest -Uri $vcUrl -OutFile $dest
          if (-not (Test-Path $dest) -or (Get-Item $dest).Length -lt 1MB) {
            Write-Error "Failed to download vc_redist.exe or file size is unexpectedly small"
            exit 1
          }

      - name: Build NSIS installer
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # clang-cl targeting aarch64 disables C++ exceptions by default;
          # llama.cpp uses throw, so we must re-enable them.
          # cc crate reads CXXFLAGS (not CMAKE_CXX_FLAGS) for extra C++ compiler flags.
          CXXFLAGS: /EHsc
        run: cargo xtask build-installer --target ${{ matrix.xtask_target }}

      - name: Azure login (OIDC)
        if: env.HAS_AZURE_SIGNING == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Sign installer (Azure Trusted Signing)
        if: env.HAS_AZURE_SIGNING == 'true'
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          endpoint: ${{ secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_TRUSTED_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_TRUSTED_SIGNING_CERT_PROFILE }}
          files-folder: target\${{ matrix.target }}\release\bundle\nsis
          files-folder-filter: exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Repackage updater bundle with signed installer
        if: env.HAS_AZURE_SIGNING == 'true'
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: pwsh
        run: |
          $nsisDir = "target/${{ matrix.target }}/release/bundle/nsis"

          $setupExe = Get-ChildItem -Path $nsisDir |
                      Where-Object { $_.Name -like "*-setup.exe" } |
                      Select-Object -First 1
          if (-not $setupExe) { Write-Error "No setup exe found in $nsisDir"; exit 1 }
          Write-Host "Using signed installer: $($setupExe.Name)"

          # Repackage the .nsis.zip so the updater delivers the signed exe.
          # IMPORTANT: Use .NET ZipFile with NoCompression (Stored, method 0).
          # The tauri-plugin-updater uses the `zip` crate without deflate
          # support, so it can ONLY extract Stored entries (method 0).
          $oldZip = Get-ChildItem -Path $nsisDir |
                    Where-Object { $_.Name -like "*.nsis.zip" } |
                    Select-Object -First 1
          if ($oldZip) {
            Remove-Item $oldZip.FullName -Force
            Remove-Item "$($oldZip.FullName).sig" -Force -ErrorAction SilentlyContinue
            Add-Type -AssemblyName System.IO.Compression.FileSystem
            $zip = [System.IO.Compression.ZipFile]::Open($oldZip.FullName, 'Create')
            [System.IO.Compression.ZipFileExtensions]::CreateEntryFromFile(
              $zip, $setupExe.FullName, $setupExe.Name,
              [System.IO.Compression.CompressionLevel]::NoCompression)
            $zip.Dispose()
            Write-Host "Repackaged updater bundle: $($oldZip.Name)"

            # Verify the zip uses Stored (method 0) — the tauri updater
            # cannot handle any other compression method.
            $bytes = [System.IO.File]::ReadAllBytes($oldZip.FullName)
            $method = [BitConverter]::ToUInt16($bytes, 8)
            if ($method -ne 0) {
              Write-Error "FATAL: nsis.zip uses compression method $method (expected 0 = Stored). The Tauri updater will reject this."
              exit 1
            }
            Write-Host "Verified: compression method = Stored (0)"

            # Re-sign the .nsis.zip with Tauri Ed25519 key
            Push-Location apps/hivemind-desktop
            npx tauri signer sign "$($oldZip.FullName)"
            Pop-Location
            Write-Host "Ed25519-signed: $($oldZip.Name).sig"
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig

  # ── Publish GitHub Release ──────────────────────────────────────────

  publish:
    needs: [setup, build-macos, build-windows]
    if: |
      always() && !cancelled() &&
      (needs.build-macos.result == 'success' || needs.build-macos.result == 'skipped') &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      (needs.build-macos.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

      - name: Create and push release tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" -m "Release $TAG"
          git push origin "$TAG" --force

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate update manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          BASE_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}"
          PUB_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Collect platform entries. Each needs a download URL and Ed25519 signature.
          # Note: GitHub replaces spaces with dots in release asset filenames,
          # so we must apply the same transformation to the URLs.
          PLATFORMS="{"

          # macOS aarch64 (.app.tar.gz produced by tauri build)
          SIG=$(find artifacts/macos-aarch64 -name "*.app.tar.gz.sig" -type f -exec cat {} \; | head -1)
          TAR=$(find artifacts/macos-aarch64 -name "*.app.tar.gz" -not -name "*.sig" -type f | head -1)
          if [ -n "$TAR" ] && [ -n "$SIG" ]; then
            TAR_NAME=$(basename "$TAR")
            TAR_NAME="${TAR_NAME// /.}"
            PLATFORMS="$PLATFORMS\"darwin-aarch64\":{\"url\":\"${BASE_URL}/${TAR_NAME}\",\"signature\":\"${SIG}\"},"
          fi

          # macOS x86_64
          SIG=$(find artifacts/macos-x86_64 -name "*.app.tar.gz.sig" -type f -exec cat {} \; | head -1)
          TAR=$(find artifacts/macos-x86_64 -name "*.app.tar.gz" -not -name "*.sig" -type f | head -1)
          if [ -n "$TAR" ] && [ -n "$SIG" ]; then
            TAR_NAME=$(basename "$TAR")
            TAR_NAME="${TAR_NAME// /.}"
            PLATFORMS="$PLATFORMS\"darwin-x86_64\":{\"url\":\"${BASE_URL}/${TAR_NAME}\",\"signature\":\"${SIG}\"},"
          fi

          # Windows x64 (.nsis.zip produced by tauri build)
          SIG=$(find artifacts/windows-x64 -name "*.nsis.zip.sig" -type f -exec cat {} \; | head -1)
          ZIP=$(find artifacts/windows-x64 -name "*.nsis.zip" -not -name "*.sig" -type f | head -1)
          if [ -n "$ZIP" ] && [ -n "$SIG" ]; then
            ZIP_NAME=$(basename "$ZIP")
            ZIP_NAME="${ZIP_NAME// /.}"
            PLATFORMS="$PLATFORMS\"windows-x86_64\":{\"url\":\"${BASE_URL}/${ZIP_NAME}\",\"signature\":\"${SIG}\"},"
          fi

          # Windows arm64
          SIG=$(find artifacts/windows-arm64 -name "*.nsis.zip.sig" -type f -exec cat {} \; | head -1)
          ZIP=$(find artifacts/windows-arm64 -name "*.nsis.zip" -not -name "*.sig" -type f | head -1)
          if [ -n "$ZIP" ] && [ -n "$SIG" ]; then
            ZIP_NAME=$(basename "$ZIP")
            ZIP_NAME="${ZIP_NAME// /.}"
            PLATFORMS="$PLATFORMS\"windows-aarch64\":{\"url\":\"${BASE_URL}/${ZIP_NAME}\",\"signature\":\"${SIG}\"},"
          fi

          # Strip trailing comma and close the object
          PLATFORMS=$(echo "$PLATFORMS" | sed 's/,$//')
          PLATFORMS="$PLATFORMS}"

          # Write the manifest using jq (avoids heredoc indentation issues in YAML)
          jq -n \
            --arg version  "${VERSION}" \
            --arg notes    "See release notes at ${BASE_URL}" \
            --arg pub_date "${PUB_DATE}" \
            --argjson platforms "${PLATFORMS}" \
            '{"version":$version,"notes":$notes,"pub_date":$pub_date,"platforms":$platforms}' \
            > artifacts/latest.json

          echo "Generated latest.json for ${VERSION}:"
          cat artifacts/latest.json

      - name: Create stable-named download aliases
        run: |
          mkdir -p artifacts/stable
          # macOS
          for arch in aarch64 x86_64; do
            PKG=$(find "artifacts/macos-${arch}" -name "*-signed.pkg" -type f 2>/dev/null | head -1)
            [ -n "$PKG" ] && cp "$PKG" "artifacts/stable/HiveMind-${arch}-signed.pkg"
            PKG=$(find "artifacts/macos-${arch}" -name "*.pkg" -not -name "*-signed*" -not -name "*-component*" -type f 2>/dev/null | head -1)
            [ -n "$PKG" ] && cp "$PKG" "artifacts/stable/HiveMind-${arch}.pkg"
          done
          # Windows
          for arch_label in x64:x64 arm64:arm64; do
            label="${arch_label%%:*}"
            dir_name="windows-${label}"
            EXE=$(find "artifacts/${dir_name}" -name "*-setup.exe" -type f 2>/dev/null | head -1)
            [ -n "$EXE" ] && cp "$EXE" "artifacts/stable/HiveMind-${label}-setup.exe"
          done
          echo "Stable aliases:"
          ls -la artifacts/stable/ || echo "(none)"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            artifacts/**/*.pkg
            artifacts/**/*.exe
            artifacts/**/*.nsis.zip
            artifacts/**/*.app.tar.gz
            artifacts/stable/*
            artifacts/latest.json
