name: Publish Plugin SDK

on:
  push:
    tags:
      - "sdk-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Optional expected SDK version"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: cd packages/plugin-sdk && npm ci

      - name: Verify tag matches package version
        run: |
          cd packages/plugin-sdk
          VERSION=$(node -p "require('./package.json').version")
          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            EXPECTED_TAG="sdk-v${VERSION}"
            if [ "${GITHUB_REF_NAME}" != "${EXPECTED_TAG}" ]; then
              echo "Ref ${GITHUB_REF_NAME} does not match ${EXPECTED_TAG}"
              exit 1
            fi
          fi
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            if [ "${{ inputs.version }}" != "${VERSION}" ]; then
              echo "Input version ${{ inputs.version }} does not match package version ${VERSION}"
              exit 1
            fi
          fi

      - name: Build
        run: cd packages/plugin-sdk && npm run build

      - name: Run tests
        run: cd packages/plugin-sdk && npm test

      - name: Dry-run pack
        run: cd packages/plugin-sdk && npm pack --dry-run

      - name: Publish
        run: cd packages/plugin-sdk && npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
