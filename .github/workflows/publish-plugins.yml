name: Publish Plugins

on:
  push:
    tags:
      - "plugin-github-issues-v*"
      - "test-plugin-v*"
  workflow_dispatch:
    inputs:
      package:
        description: "Which package to publish"
        required: true
        type: choice
        options:
          - github-issues
          - test-plugin
      version:
        description: "Optional expected package version"
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  resolve-package:
    runs-on: ubuntu-latest
    outputs:
      package_dir: ${{ steps.resolve.outputs.package_dir }}
      tag_prefix: ${{ steps.resolve.outputs.tag_prefix }}
    steps:
      - id: resolve
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            case "${{ inputs.package }}" in
              github-issues)
                echo "package_dir=packages/sample-plugins/github-issues" >> "$GITHUB_OUTPUT"
                echo "tag_prefix=plugin-github-issues" >> "$GITHUB_OUTPUT"
                ;;
              test-plugin)
                echo "package_dir=packages/test-plugin" >> "$GITHUB_OUTPUT"
                echo "tag_prefix=test-plugin" >> "$GITHUB_OUTPUT"
                ;;
              *)
                echo "Unsupported package input: ${{ inputs.package }}"
                exit 1
                ;;
            esac
            exit 0
          fi

          case "${GITHUB_REF_NAME}" in
            plugin-github-issues-v*)
              echo "package_dir=packages/sample-plugins/github-issues" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=plugin-github-issues" >> "$GITHUB_OUTPUT"
              ;;
            test-plugin-v*)
              echo "package_dir=packages/test-plugin" >> "$GITHUB_OUTPUT"
              echo "tag_prefix=test-plugin" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported tag: ${GITHUB_REF_NAME}"
              exit 1
              ;;
          esac

  publish:
    needs: resolve-package
    runs-on: ubuntu-latest
    if: ${{ needs.resolve-package.result == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Install and build SDK
        run: cd packages/plugin-sdk && npm ci && npm run build

      - name: Install package dependencies
        run: cd ${{ needs.resolve-package.outputs.package_dir }} && npm ci

      - name: Build and test package
        run: |
          cd ${{ needs.resolve-package.outputs.package_dir }}
          npm run build
          npm test

      - name: Dry-run publish package
        run: node scripts/publish-plugin-package.mjs ${{ needs.resolve-package.outputs.package_dir }} --tag-prefix ${{ needs.resolve-package.outputs.tag_prefix }} --dry-run

      - name: Publish package
        run: node scripts/publish-plugin-package.mjs ${{ needs.resolve-package.outputs.package_dir }} --tag-prefix ${{ needs.resolve-package.outputs.tag_prefix }} --publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
