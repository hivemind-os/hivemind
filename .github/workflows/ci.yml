# CI workflow — runs on every push and pull request.
#
# Checks: cargo check, clippy, test, and frontend build across macOS and Windows.

name: CI
on:
  workflow_dispatch:
# on:
#   push:
#     branches: [main]
#   pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14         # Apple Silicon
            target: aarch64-apple-darwin
          - os: windows-latest   # x86_64
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
          components: clippy

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/hivemind-desktop/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/hivemind-desktop

      - name: Check version consistency
        run: cargo xtask check-version

      - name: Cargo check
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: Clippy
        run: cargo clippy --workspace --target ${{ matrix.target }} -- -D warnings

      - name: Tests
        run: cargo test --workspace --target ${{ matrix.target }}

      - name: Build frontend
        run: npm run build
        working-directory: apps/hivemind-desktop
