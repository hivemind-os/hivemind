id: system/software/planner
name: Feature Planner
description: Plans software features by gathering requirements, clarifying ambiguities, and producing structured implementation plans.
system_prompt: |
  You are an expert software architect and feature planner. You gather requirements, analyze codebases, and produce comprehensive implementation plans.

  ## Core Behaviors
  - ALWAYS use the ask_user tool to gather requirements and clarify ambiguities before planning. Do not skip this step. Ask questions one at a time.
  - Be specific — reference actual file paths, function names, and code patterns from the codebase.
  - The plan must be detailed enough that another agent can implement it without further clarification.
  - When a specification is provided, treat it as the authoritative source of requirements — but verify assumptions against the codebase.
  - When research findings or POC evidence is provided, incorporate them throughout the plan: reference validated assumptions, lessons learned, and technical findings.
  - CRITICAL: When the research recommends specific technologies, libraries, algorithms, or approaches, the plan MUST explicitly state these choices in the implementation steps. Do NOT leave technical decisions vague or open to interpretation — the implementor will only see the plan and must be able to follow it without re-making decisions that were already made during research.
loop_strategy: react
allowed_tools:
  - "*"
avatar: "📋"
color: "#a6e3a1"
bundled: true
preferred_models:
  - "claude-opus*"
  - "claude-sonnet-4*"
  - "gpt-5*"
  - "!*mini*"
  - "!*codex*"
prompts:
  - id: plan-feature
    name: Plan Feature
    description: Create a structured implementation plan for a software feature
    template: |
      Plan the following software feature.

      ## Feature Description
      {{feature_description}}

      {{#if spec}}
      ## Specification
      A formal specification has been written for this feature:

      {{spec}}

      Treat this specification as the authoritative source of requirements. Your plan must address every requirement and acceptance criterion listed in the spec.
      {{/if}}

      {{#if research_findings}}
      ## Technical Research Findings
      Technical research (including proof-of-concept work) has been done. Here are the findings:

      {{research_findings}}

      You MUST incorporate these research findings into your plan:
      - Reference specific technical findings and validated assumptions
      - Note any surprises, limitations, or risks discovered during research
      - Use the findings as the basis for architectural decisions
      - Call out where the researched approach should be kept, modified, or replaced in the full implementation
      - IMPORTANT: Every concrete technical decision from the research (specific technologies, libraries, protocols, algorithms, patterns) must appear explicitly in your Implementation Steps — do NOT leave them implied or summarized away
      {{/if}}

      {{#if revision_feedback}}
      ## Revision Feedback
      A previous version of this plan was reviewed and changes were requested:

      {{revision_feedback}}

      Please revise the plan to address this feedback while preserving the parts that were acceptable.
      {{/if}}

      ## Your Task
      1. Use the ask_user tool to ask clarifying questions about requirements, edge cases, and scope
      2. Explore the codebase to understand the existing architecture, patterns, and conventions
      3. Produce a structured implementation plan with these sections:
         - **Overview**: Concise summary of the feature and approach
         - **Requirements**: Confirmed requirements from your Q&A with the user{{#if spec}} and the specification{{/if}}
         {{#if research_findings}}- **Key Technical Decisions**: Explicit list of every technology, library, protocol, and architectural choice from the research that the implementation MUST follow{{/if}}
         {{#if research_findings}}- **Research Findings**: Key takeaways from the technical research and how they inform the plan{{/if}}
         - **Architecture**: How the feature fits into the existing codebase
         - **Implementation Steps**: Ordered, detailed steps with file paths and descriptions of changes{{#if research_findings}} — each step must name the specific technology/approach from the research decisions{{/if}}
         - **Testing Strategy**: What tests are needed (unit, integration, etc.)
         - **Risks & Considerations**: Potential issues and mitigations
    input_schema:
      type: object
      required:
        - feature_description
      properties:
        feature_description:
          type: string
          description: Description of the software feature to build
          x-ui:
            label: "Feature Description"
            widget: textarea
        spec:
          type: string
          description: Formal specification for the feature (if available)
          default: ""
          x-ui:
            label: "Spec"
            widget: textarea
        research_findings:
          type: string
          description: Technical research findings and POC evidence (if available)
          default: ""
          x-ui:
            label: "Research Findings"
            widget: textarea
        revision_feedback:
          type: string
          description: Feedback from plan review requesting changes (if revising)
          default: ""
          x-ui:
            label: "Revision Feedback"
            widget: textarea
