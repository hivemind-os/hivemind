# Well-known model metadata: context windows, output limits, and capabilities.
#
# Used as a fallback when the provider does not report model metadata.
# Values sourced from official documentation as of March 2026.
#
# Fields:
#   capabilities    - known capabilities: chat, code, vision, tool-use, embedding
#   context_window  - total context window in tokens (input + output share this)
#   max_output_tokens - maximum tokens the model will generate in a single response
#
# Model names are matched by prefix: "gpt-4o" matches "gpt-4o-2024-08-06", etc.
# More-specific entries are checked first (longest prefix match wins).

default_context_window: 32768

models:
